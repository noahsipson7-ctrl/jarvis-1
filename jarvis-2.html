<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #111820;
    --accent: #3fd0ff;
    --accent-dim: #1a6b82;
    --text: #e8f4f8;
    --text-dim: #7a8a95;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #10202a 0%, var(--bg) 70%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  h1 {
    font-weight: 600;
    letter-spacing: 4px;
    font-size: 1.4rem;
    color: var(--accent);
    margin: 12px 0 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  #setup {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #1e2a33;
  }
  #setup label {
    font-size: 0.8rem;
    color: var(--text-dim);
    display: block;
    margin-bottom: 6px;
  }
  #apiKey {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #223038;
    background: #0d1319;
    color: var(--text);
    font-size: 0.9rem;
  }
  .orb-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orb-wrap {
    width: 220px;
    height: 220px;
  }

  #orb:active { transform: scale(0.96); }
  #orb.listening {
    animation: rotate-ring 3s linear infinite;
    box-shadow: 0 0 60px rgba(63,208,255,0.8);
  }
  #orb.thinking {
    animation: rotate-ring 1s linear infinite;
    box-shadow: 0 0 60px rgba(63,208,255,0.6);
  }
  @keyframes rotate-ring {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }
  #orbLabel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 94px;
    height: 94px;
    border-radius: 50%;
    background: #002457;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 2;
  }
  #status {
    font-size: 0.85rem;
    color: var(--text-dim);
    min-height: 20px;
    margin-bottom: 10px;
  }
  #log {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.92rem;
    line-height: 1.4;
    max-width: 90%;
  }
  .you {
    align-self: flex-end;
    background: var(--accent-dim);
    color: #eafcff;
  }
  .jarvis {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid #1e2a33;
  }

</head>
<body>
  <h1>J A R V I S</h1>
  <div class="subtitle">tap the orb and speak</div>

  <div id="setup">
    <label for="apiKey">Anthropic API key (kept only in this page's memory, never saved)</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <label style="margin-top:14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
      <span>Always listen for "Jarvis"</span>
      <input type="checkbox" id="wakeToggle" style="width:18px; height:18px;">
    </label>
    <div style="font-size:0.72rem; color:var(--text-dim); margin-top:6px;">
      Needs this tab open and in the foreground. Say "Jarvis" alone, or "Jarvis, what's the weather" in one breath.
    </div>
  </div>

  <div class="orb-wrap">
    <button id="orb" aria-label="Talk to Jarvis"></button>
    <div id="orbLabel" aria-hidden="true">J.A.R.V.I.S</div>
  </div>
  <div id="status">tap to talk</div>

  <div id="log"></div>

<script>
  const orb = document.getElementById('orb');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const apiKeyInput = document.getElementById('apiKey');
  const wakeToggle = document.getElementById('wakeToggle');

  let recognition = null;
  let wakeModeOn = false;
  let awaitingCommand = false; // true right after "Jarvis" was said with no command attached
  let manualStop = false; // true when we deliberately stop recognition (e.g. while speaking)
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    statusEl.textContent = 'Speech recognition not supported in this browser. Try Chrome.';
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
  }

  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = 'bubble ' + who;
    div.textContent = text;
    logEl.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function setState(state) {
    orb.classList.remove('listening', 'thinking');
    if (state === 'listening') {
      orb.classList.add('listening');
      statusEl.textContent = 'listening...';
    } else if (state === 'thinking') {
      orb.classList.add('thinking');
      statusEl.textContent = 'thinking...';
    } else if (state === 'speaking') {
      statusEl.textContent = 'speaking...';
    } else {
      statusEl.textContent = 'tap to talk';
    }
  }

  function speak(text, onDone) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.onstart = () => {
      setState('speaking');
      if (recognition) {
        manualStop = true;
        try { recognition.stop(); } catch (e) {}
      }
    };
    utter.onend = () => {
      setState('idle');
      if (onDone) onDone();
      if (wakeModeOn && recognition) {
        manualStop = false;
        try { recognition.start(); } catch (e) {}
      }
    };
    speechSynthesis.speak(utter);
  }

  async function askClaude(userText) {
    const key = apiKeyInput.value.trim();
    if (!key) {
      addBubble('Please enter your Anthropic API key above first.', 'jarvis');
      setState('idle');
      return;
    }
    setState('thinking');
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 400,
          system: 'You are Jarvis, a concise and helpful voice assistant. Keep replies short and conversational since they will be spoken aloud.',
          messages: [{ role: 'user', content: userText }]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error('API error ' + response.status + ': ' + errText);
      }

      const data = await response.json();
      const reply = data.content && data.content[0] && data.content[0].text
        ? data.content[0].text
        : "Sorry, I didn't get a proper response.";

      addBubble(reply, 'jarvis');
      speak(reply);
    } catch (err) {
      console.error(err);
      addBubble('Error: ' + err.message, 'jarvis');
      setState('idle');
    }
  }

  let userStopped = false;

  function stopEverything() {
    speechSynthesis.cancel();
    awaitingCommand = false;
    userStopped = true;
    if (recognition) {
      manualStop = true;
      try { recognition.stop(); } catch (e) {}
    }
    orb.classList.remove('listening', 'thinking');
    statusEl.textContent = 'stopped';
  }

  let lastTapTime = 0;
  const DOUBLE_TAP_MS = 350;

  orb.addEventListener('click', () => {
    const now = Date.now();
    const isDoubleTap = (now - lastTapTime) < DOUBLE_TAP_MS;
    lastTapTime = isDoubleTap ? 0 : now;

    if (isDoubleTap) {
      stopEverything();
      return;
    }

    if (!recognition) return;
    if (wakeModeOn) {
      if (manualStop) {
        manualStop = false;
        setState('listening');
        try { recognition.start(); } catch (e) {}
      }
      return;
    }
    setState('listening');
    try { recognition.start(); } catch (e) {}
  });

  wakeToggle.addEventListener('change', () => {
    if (!recognition) return;
    wakeModeOn = wakeToggle.checked;
    if (wakeModeOn) {
      recognition.continuous = true;
      manualStop = false;
      setState('listening');
      try { recognition.start(); } catch (e) {}
    } else {
      recognition.continuous = false;
      manualStop = true;
      try { recognition.stop(); } catch (e) {}
      setState('idle');
    }
  });

  function handleWakeWordTranscript(rawTranscript) {
    const lower = rawTranscript.toLowerCase();

    if (awaitingCommand) {
      // We already said "Here, sir" last turn — treat this whole utterance as the command
      awaitingCommand = false;
      addBubble(rawTranscript, 'you');
      askClaude(rawTranscript);
      return;
    }

    const wakeIndex = lower.indexOf('jarvis');
    if (wakeIndex === -1) return; // no wake word, ignore silently

    const after = rawTranscript.slice(wakeIndex + 'jarvis'.length).replace(/^[,.\s]+/, '').trim();

    if (after.length > 0) {
      // "Jarvis, what's the weather" said in one breath
      addBubble(after, 'you');
      speak('Here, sir.', () => askClaude(after));
    } else {
      // Just "Jarvis" — acknowledge and wait for the follow-up
      speak('Here, sir.', () => { awaitingCommand = true; });
    }
  }

  if (recognition) {
    recognition.onresult = (event) => {
      const transcript = event.results[event.results.length - 1][0].transcript;
      if (wakeModeOn) {
        handleWakeWordTranscript(transcript);
      } else {
        addBubble(transcript, 'you');
        askClaude(transcript);
      }
    };
    recognition.onerror = (event) => {
      if (event.error === 'no-speech' && wakeModeOn) return; // expected in always-on mode, just keep going
      statusEl.textContent = 'error: ' + event.error;
      if (!wakeModeOn) setState('idle');
    };
    recognition.onend = () => {
      if (userStopped) {
        userStopped = false;
        return; // leave the 'stopped' message alone — don't reset to idle text
      }
      if (wakeModeOn && !manualStop && !speechSynthesis.speaking) {
        // Chrome auto-stops recognition after a pause; restart to stay "always on"
        try { recognition.start(); } catch (e) {}
      } else if (!wakeModeOn) {
        setState('idle');
      }
    };
  }
</script>
</body>
</html>
